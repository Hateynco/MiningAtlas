name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild source files
        run: |
          python - <<'PY'
          from pathlib import Path

          def rebuild(target_name: str) -> None:
            parts = sorted(Path("pages-src").glob(f"{target_name}.b64.part*.txt"))
            if not parts:
              raise SystemExit(f"Missing source parts for {target_name}")
            payload = b"".join(path.read_bytes() for path in parts)
            Path(target_name).write_bytes(payload)
            print(f"Rebuilt {target_name} from {len(parts)} parts")

          rebuild("index.html")
          rebuild("app.js")
          rebuild("build_historical_db.py")
          PY

      - name: Build mining history dataset
        run: python build_historical_db.py

      - name: Build static artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp app.js _site/app.js
          cp mining_history.json _site/mining_history.json
          cp mining_history.json.gz.b64.txt _site/mining_history.json.gz.b64.txt
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
