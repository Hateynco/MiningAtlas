name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Rebuild compressed dataset
        run: |
          python - <<'PY'
          from pathlib import Path

          parts = sorted(Path("pages-gzip").glob("mining_history.json.gz.b64.part*.txt"))
          if not parts:
            raise SystemExit("Missing compressed history dataset parts")

          content = "".join(path.read_text(encoding="ascii") for path in parts)
          Path("mining_history.json.gz.b64.txt").write_text(content, encoding="ascii")
          print(f"Rebuilt mining_history.json.gz.b64.txt from {len(parts)} parts")
          PY

      - name: Build static artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp app.js _site/app.js
          cp mining_history.json.gz.b64.txt _site/mining_history.json.gz.b64.txt
          cp db.json _site/db.json
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
