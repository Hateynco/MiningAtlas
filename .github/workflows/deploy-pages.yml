name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build static artifact
        run: |
          mkdir -p _site
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          parts = sorted(Path('pages-gzip').glob('db.json.gz.b64.part*.txt'))
          payload = ''.join(path.read_text(encoding='ascii') for path in parts)
          data = gzip.decompress(base64.b64decode(payload))

          Path('_site').mkdir(exist_ok=True)
          Path('_site/db.json').write_bytes(data)
          PY
          cp index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
