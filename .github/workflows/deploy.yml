name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Unpack site source
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          target = Path("site")
          target.mkdir(exist_ok=True)
          with ZipFile("site-source.zip") as archive:
              archive.extractall(target)
          PY

      - name: Download runtime assets
        working-directory: site
        run: |
          mkdir -p data vendor/leaflet
          curl -L -o data/world-countries.geojson https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson
          curl -L -o vendor/leaflet/leaflet.css https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
          curl -L -o vendor/leaflet/leaflet.js https://unpkg.com/leaflet@1.9.4/dist/leaflet.js

      - name: Generate atlas data
        working-directory: site
        run: python scripts/generate_data.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
